name: "Ghast CI"

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions: read-all

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    permissions: read-all
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    timeout-minutes: 15

    steps:    
    - name: Checkout repository
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.1
      with:
        persist-credentials: false
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
        pip install -r requirements-dev.txt
      shell: bash

    - name: Run tests
      run: |
        pytest --cov=ghast ghast/tests/
      shell: bash

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.1
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -e .
      shell: bash

    - name: Lint with flake8
      run: |
        flake8 ghast --count --select=E9,F63,F7,F82 --show-source --statistics
      shell: bash

    - name: Type check with mypy
      run: |
        mypy ghast
      shell: bash

  self-check:
    name: Self-check with Ghast
    permissions: read-all
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.1
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install ghast
      run: |
        python -m pip install --upgrade pip
        pip install -e .
      shell: bash

    - name: Run ghast on workflow files
      run: |
        ghast scan . --severity-threshold MEDIUM
      shell: bash


  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, lint, self-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.1
      with:
        persist-credentials: false

    - name: Configure GitHub Pages
      uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
      with:
        path: docs

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  build-and-publish:
    name: Build and publish Python distributions
    runs-on: ubuntu-latest
    needs: [test, lint, self-check]    
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15
        
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.1
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
      shell: bash

    - name: Build package
      run: |
        python -m build
      shell: bash

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@e53eb8b103ffcb59469888563dc324e3c8ba6f06 # v1.8.10
      with:
        user: __token__        
        password: ${{ secrets.PYPI_API_TOKEN }}
